services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-open_sentry}
      POSTGRES_USER: ${POSTGRES_USER:-sentry}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentry_dev}
    # ports:
    #   - "${DB_PORT:-5432}:5432"
    volumes:
      - ./.data/pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sentry} -d ${POSTGRES_DB:-open_sentry}"]
      interval: 5s
      timeout: 3s
      retries: 5

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4j_dev}
    # ports:
    #   - "${NEO4J_BOLT_PORT:-7687}:7687"
    #   - "${NEO4J_HTTP_PORT:-7474}:7474"
    volumes:
      - ./.data/neo4j:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - ./.data/minio:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    command: >
      uvicorn monolynx.main:app
      --host 0.0.0.0
      --port ${APP_PORT:-8000}
      --reload
      --reload-dir /app/src
    ports:
      - "${APP_PORT:-8000}:${APP_PORT:-8000}"
    volumes:
      - ./src:/app/src:cached
      - ./alembic:/app/alembic:cached
      - ./alembic.ini:/app/alembic.ini:cached
      - ./tests:/app/tests:cached
      - ./sdk:/app/sdk:cached
      - ./pyproject.toml:/app/pyproject.toml:cached
      - ./cicd:/app/cicd:cached
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sentry}:${POSTGRES_PASSWORD:-sentry_dev}@db:5432/${POSTGRES_DB:-open_sentry}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SECRET_KEY: ${SECRET_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      APP_URL: ${APP_URL:-http://localhost:8000}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@monolynx.local}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-monolynx-wiki}
      MINIO_USE_SSL: "false"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4j_dev}
      ENABLE_GRAPH_DB: ${ENABLE_GRAPH_DB:-true}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    profiles:
      - dev

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    command: python -m monolynx.worker
    volumes:
      - ./src:/app/src:cached
      - ./pyproject.toml:/app/pyproject.toml:cached
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sentry}:${POSTGRES_PASSWORD:-sentry_dev}@db:5432/${POSTGRES_DB:-open_sentry}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - worker

