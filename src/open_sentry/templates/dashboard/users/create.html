{% extends "layouts/base.html" %}

{% block title %}Nowy uzytkownik - Open Sentry{% endblock %}

{% block nav_right %}
<a href="/dashboard/users" class="text-indigo-400 hover:text-indigo-300 text-sm">Uzytkownicy</a>
<form method="post" action="/auth/logout">
    <button type="submit" class="text-gray-400 hover:text-white text-sm">Wyloguj</button>
</form>
{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <h1 class="text-2xl font-bold mb-6">Nowy uzytkownik</h1>

    {% if error %}
    <div class="bg-red-900/50 border border-red-500 text-red-300 px-4 py-2 rounded mb-4">
        {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/dashboard/users/create" class="bg-gray-800 border border-gray-700 rounded-lg p-6 space-y-4">
        <div>
            <label class="block text-sm text-gray-400 mb-1">Imie</label>
            <input type="text" name="first_name" value="{{ first_name }}"
                class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white focus:outline-none focus:border-indigo-500">
        </div>
        <div>
            <label class="block text-sm text-gray-400 mb-1">Nazwisko</label>
            <input type="text" name="last_name" value="{{ last_name }}"
                class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white focus:outline-none focus:border-indigo-500">
        </div>
        <div>
            <label class="block text-sm text-gray-400 mb-1">Email *</label>
            <input type="email" name="email" value="{{ email }}" required
                class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white focus:outline-none focus:border-indigo-500">
        </div>
        <div class="flex items-center gap-2">
            <input type="checkbox" name="send_email" id="send_email" checked
                class="rounded bg-gray-700 border-gray-600 text-indigo-600 focus:ring-indigo-500">
            <label for="send_email" class="text-sm text-gray-400">Wyslij email z zaproszeniem</label>
        </div>
        <div class="flex gap-3 pt-2">
            <button type="submit"
                class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-4 py-2 rounded transition text-sm">
                Utworz uzytkownika
            </button>
            <a href="/dashboard/users"
               class="bg-gray-700 hover:bg-gray-600 text-gray-300 font-medium px-4 py-2 rounded transition text-sm">
                Anuluj
            </a>
        </div>
    </form>
</div>
{% endblock %}
