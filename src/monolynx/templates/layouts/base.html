<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Monolynx{% endblock %}</title>
    <meta name="description" content="Monolynx — open-source AI-first project platform.">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Monolynx">
    <meta property="og:description" content="Open-source AI-first project platform with error tracking, Scrum, monitoring, wiki, and MCP tools.">
    <meta property="og:image" content="{{ request.base_url }}static/img/screenshots/social-media.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Monolynx">
    <meta name="twitter:image" content="{{ request.base_url }}static/img/screenshots/social-media.png">
    <link rel="icon" type="image/png" href="/static/img/favicon/favicon-96x96.png" sizes="96x96">
    <link rel="icon" type="image/svg+xml" href="/static/img/favicon/favicon.svg">
    <link rel="shortcut icon" href="/static/img/favicon/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/img/favicon/apple-touch-icon.png">
    <link rel="manifest" href="/static/img/favicon/site.webmanifest">
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <nav class="bg-gray-800 border-b border-gray-700 px-6 py-3 flex items-center justify-between">
        <a href="/dashboard/" class="flex items-center">
            <img src="/static/img/monolynx-logo-white.svg" alt="Monolynx" class="h-7">
        </a>
        <div class="flex items-center gap-4">
            {% block nav_right %}
            <a href="/dashboard/reports" class="text-indigo-400 hover:text-indigo-300 text-sm">Raporty</a>
            {% if request.session.get('is_superuser') %}
            <a href="/dashboard/users" class="text-indigo-400 hover:text-indigo-300 text-sm">Użytkownicy</a>
            {% endif %}
            <a href="/dashboard/profile/tokens" class="text-indigo-400 hover:text-indigo-300 text-sm">Tokeny API</a>
            <a href="/dashboard/profile/mcp-guide" class="text-indigo-400 hover:text-indigo-300 text-sm">How to MCP</a>
            <form method="post" action="/auth/logout">
                <button type="submit" class="text-gray-400 hover:text-white text-sm">Wyloguj</button>
            </form>
            {% endblock %}
        </div>
    </nav>
    <main class="{% block main_class %}max-w-6xl{% endblock %} mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>
    {% include "components/toasts.html" %}
</body>
</html>
