<!DOCTYPE html>
<html lang="pl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Monolynx{% endblock %}</title>
    <meta name="description" content="Monolynx — open-source AI-first project platform.">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Monolynx">
    <meta property="og:description" content="Open-source AI-first project platform with error tracking, Scrum, monitoring, wiki, and MCP tools.">
    <meta property="og:image" content="{{ request.base_url }}static/img/screenshots/social-media.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Monolynx">
    <meta name="twitter:image" content="{{ request.base_url }}static/img/screenshots/social-media.png">
    <link rel="icon" type="image/png" href="/static/img/favicon/favicon-96x96.png" sizes="96x96">
    <link rel="icon" type="image/svg+xml" href="/static/img/favicon/favicon.svg">
    <link rel="shortcut icon" href="/static/img/favicon/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/img/favicon/apple-touch-icon.png">
    <link rel="manifest" href="/static/img/favicon/site.webmanifest">
    <!-- Anti-FOUC: apply saved theme before any rendering -->
    <script>
        (function() {
            var saved = localStorage.getItem('monolynx-theme');
            if (saved === 'light') {
                document.documentElement.classList.remove('dark');
            }
            // default: keep 'dark' class set on <html>
        })();
    </script>
    <!-- Tailwind darkMode: 'class' config must come before CDN -->
    <script>window.tailwind = window.tailwind || {};</script>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: {} }
        };
    </script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen transition-colors duration-200">
    <nav class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 px-6 py-3 flex items-center justify-between">
        <a href="/dashboard/" class="flex items-center">
            <!-- Logo ciemny motyw -->
            <img src="/static/img/monolynx-logo-white.svg" alt="Monolynx" class="h-7 hidden dark:block">
            <!-- Logo jasny motyw -->
            <img src="/static/img/monolynx-logo-color.svg" alt="Monolynx" class="h-7 dark:hidden">
        </a>
        <div class="flex items-center gap-4">
            {% block nav_right %}
            <a href="/dashboard/reports" class="text-indigo-600 dark:text-indigo-400 hover:text-indigo-700 dark:hover:text-indigo-300 text-sm">Raporty</a>
            {% if request.session.get('is_superuser') %}
            <a href="/dashboard/users" class="text-indigo-600 dark:text-indigo-400 hover:text-indigo-700 dark:hover:text-indigo-300 text-sm">Użytkownicy</a>
            {% endif %}
            <a href="/dashboard/profile/tokens" class="text-indigo-600 dark:text-indigo-400 hover:text-indigo-700 dark:hover:text-indigo-300 text-sm">Tokeny API</a>
            <a href="/dashboard/profile/mcp-guide" class="text-indigo-600 dark:text-indigo-400 hover:text-indigo-700 dark:hover:text-indigo-300 text-sm">How to MCP</a>
            <!-- Przełącznik motywu -->
            <button id="theme-toggle" onclick="toggleTheme()"
                    class="text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white transition p-1 rounded"
                    title="Przełącz motyw" aria-label="Przełącz motyw">
                <!-- Ikona słońca — widoczna w ciemnym motywie (kliknij = przejdź do jasnego) -->
                <svg class="w-5 h-5 hidden dark:block" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                </svg>
                <!-- Ikona księżyca — widoczna w jasnym motywie (kliknij = przejdź do ciemnego) -->
                <svg class="w-5 h-5 dark:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                </svg>
            </button>
            <form method="post" action="/auth/logout">
                <button type="submit" class="text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white text-sm">Wyloguj</button>
            </form>
            {% endblock %}
        </div>
    </nav>
    <main class="{% block main_class %}max-w-6xl{% endblock %} mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>
    {% include "components/toasts.html" %}
    <script>
        function toggleTheme() {
            var html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('monolynx-theme', 'light');
            } else {
                html.classList.add('dark');
                localStorage.setItem('monolynx-theme', 'dark');
            }
        }
    </script>
</body>
</html>
