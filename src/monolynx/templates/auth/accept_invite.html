<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ustaw haslo - Monolynx</title>
    <meta name="description" content="Monolynx — open-source AI-first project platform.">
    <meta property="og:title" content="Monolynx">
    <meta property="og:image" content="{{ request.base_url }}static/img/screenshots/social-media.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="{{ request.base_url }}static/img/screenshots/social-media.png">
    <link rel="icon" type="image/png" href="/static/img/favicon/favicon-96x96.png" sizes="96x96">
    <link rel="icon" type="image/svg+xml" href="/static/img/favicon/favicon.svg">
    <link rel="shortcut icon" href="/static/img/favicon/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/img/favicon/apple-touch-icon.png">
    <link rel="manifest" href="/static/img/favicon/site.webmanifest">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-gray-800 p-8 rounded-lg shadow-lg w-full max-w-md">
        <h1 class="text-2xl font-bold text-indigo-400 mb-6 text-center">Monolynx</h1>

        {% if not valid %}
        <div class="bg-red-900/50 border border-red-500 text-red-300 px-4 py-3 rounded text-center">
            <p class="font-medium mb-1">Nieprawidlowy lub wygasly link</p>
            <p class="text-sm">Skontaktuj sie z administratorem, aby otrzymac nowe zaproszenie.</p>
        </div>
        <div class="mt-4 text-center">
            <a href="/auth/login" class="text-indigo-400 hover:text-indigo-300 text-sm">Przejdz do logowania</a>
        </div>
        {% else %}
        <p class="text-gray-400 text-sm mb-4 text-center">Ustaw haslo, aby aktywowac swoje konto.</p>

        {% if error %}
        <div class="bg-red-900/50 border border-red-500 text-red-300 px-4 py-2 rounded mb-4">
            {{ error }}
        </div>
        {% endif %}

        <form method="post" action="/auth/accept-invite/{{ token }}" class="space-y-4">
            <div>
                <label class="block text-sm text-gray-400 mb-1">Haslo</label>
                <input type="password" name="password" required minlength="8"
                    class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white focus:outline-none focus:border-indigo-500">
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-1">Potwierdź hasło</label>
                <input type="password" name="password_confirm" required minlength="8"
                    class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white focus:outline-none focus:border-indigo-500">
            </div>
            <button type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 rounded transition">
                Ustaw haslo
            </button>
        </form>
        {% endif %}
    </div>
</body>
</html>
