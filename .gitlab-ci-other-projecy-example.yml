image: docker:stable

services:
  - name: docker:stable-dind
    command: ["--tls=false", "--insecure-registry=registry.gitlab.com"]

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  DEV_REPOSITORY_URL: registry.gitlab.com/monolynx/awesome-sms
  # Disable content trust to avoid certificate issues
  DOCKER_CONTENT_TRUST: 0

stages:
  - build-test
  - test
  - build-develop
  - build-prod
  - deploy


build-base-images-job:
  stage: build-test
  script:
    - export
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

    # Build prod-base
    - echo "Building prod-base image..."
    - export DOCKER_BUILDKIT=1
    - timeout 60m docker build
        --progress=plain
        --no-cache
        -t $DEV_REPOSITORY_URL:prod-base
        -f docker/base/Dockerfile.prod-base .
    - echo "Pushing prod-base image..."
    - timeout 60m docker push $DEV_REPOSITORY_URL:prod-base

    # Build stage-base (uses prod-base)
    - echo "Building stage-base image..."
    - timeout 60m docker build
        --progress=plain
        --no-cache
        -t $DEV_REPOSITORY_URL:stage-base
        -f docker/base/Dockerfile.stage-base .
    - echo "Pushing stage-base image..."
    - timeout 60m docker push $DEV_REPOSITORY_URL:stage-base

    # Save image sizes for badges
    - PROD_BASE_SIZE=$(docker images $DEV_REPOSITORY_URL:prod-base --format "{{.Size}}")
    - STAGE_BASE_SIZE=$(docker images $DEV_REPOSITORY_URL:stage-base --format "{{.Size}}")
    - echo "$PROD_BASE_SIZE" > prod_base_image_size.txt
    - echo "$STAGE_BASE_SIZE" > stage_base_image_size.txt

  retry:
    max: 2
    when:
      - runner_system_failure
      - api_failure

  rules:
    # Trigger ONLY when Poetry or Dockerfile changes
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - dist/app/poetry.lock
        - dist/app/pyproject.toml
        - docker/base/Dockerfile.prod-base
        - docker/base/Dockerfile.stage-base
    - if: '$CI_COMMIT_BRANCH == "develop" && $CI_PIPELINE_SOURCE == "push"'
      changes:
        - dist/app/poetry.lock
        - dist/app/pyproject.toml
        - docker/base/Dockerfile.prod-base
        - docker/base/Dockerfile.stage-base

  artifacts:
    paths:
      - prod_base_image_size.txt
      - stage_base_image_size.txt


build-images-job:
  stage: build-test
  script:
    - export
    - touch dist/app/app/local.py
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

    # Pull base images for cache (ignore errors if they don't exist)
    - docker pull $DEV_REPOSITORY_URL:prod-base || true
    - docker pull $DEV_REPOSITORY_URL:stage-base || true

    - echo "Building test image..."
    - export DOCKER_BUILDKIT=1
    # Use cache from prod-base (production dependencies only)
    - timeout 60m docker build
        --progress=plain
        --cache-from=$DEV_REPOSITORY_URL:prod-base
        -t $DEV_REPOSITORY_URL:test
        -f docker/test/Dockerfile .
    - echo "Pushing test image..."
    - timeout 60m docker push $DEV_REPOSITORY_URL:test

    - echo "Building dev image..."
    # Use cache from stage-base (production + dev dependencies)
    - timeout 60m docker build
        --progress=plain
        --cache-from=$DEV_REPOSITORY_URL:stage-base
        -t $DEV_REPOSITORY_URL:dev
        -f docker/Dockerfile .
    - echo "Pushing dev image..."
    - timeout 60m docker push $DEV_REPOSITORY_URL:dev

    - TEST_IMAGE_SIZE=$(docker images $DEV_REPOSITORY_URL:test --format "{{.Size}}")
    - DEV_IMAGE_SIZE=$(docker images $DEV_REPOSITORY_URL:dev --format "{{.Size}}")
    - echo "$TEST_IMAGE_SIZE" > test_image_size.txt
    - echo "$DEV_IMAGE_SIZE" > dev_image_size.txt

  retry:
    max: 2
    when:
      - runner_system_failure
      - api_failure

  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" || ($CI_COMMIT_BRANCH == "develop" && $CI_PIPELINE_SOURCE == "push")'

  needs:
    - job: build-base-images-job
      optional: true  # Job may not exist (when no changes in Poetry)

  artifacts:
    paths:
      - test_image_size.txt
      - dev_image_size.txt

dockle-test-job:
  stage: test
  script:
    #    - |
    #      if [ -z "$CI_DOCKERFILE_CHANGED" ]; then
    #        echo "Dockerfile nie został zmieniony. Pomijam szczegółowe testy."
    #        exit 0
    #      fi
    - echo "Running Dockle on test image..."
    - dockle -v
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - timeout 60m docker pull $DEV_REPOSITORY_URL:test
    - dockle -af settings.py --exit-code 1 $DEV_REPOSITORY_URL:test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      variables:
        CI_DOCKERFILE_CHANGED: $CI_DOCKERFILE_CHANGED
      changes:
        - docker/test/Dockerfile
        - docker/Dockerfile
    - if: '$CI_COMMIT_BRANCH == "develop" && $CI_PIPELINE_SOURCE == "push"'
      variables:
        CI_DOCKERFILE_CHANGED: "false"
  needs:
    - build-images-job

trivy-test-job:
  stage: test
  script:
    # Scan poetry.lock for high/critical vulnerabilities
    - trivy fs --scanners vuln --ignore-unfixed --severity HIGH,CRITICAL --exit-code 1 dist/app/poetry.lock
    - trivy fs --scanners vuln --ignore-unfixed --exit-code 0 dist/app/poetry.lock
    # Login to registry before scanning image
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - timeout 60m docker pull $DEV_REPOSITORY_URL:test
    # Scan the test image using trivy's built-in registry authentication
    # - trivy image --ignore-unfixed --severity HIGH,CRITICAL --exit-code 1 $DEV_REPOSITORY_URL:test
    - trivy image --ignore-unfixed --exit-code 0 $DEV_REPOSITORY_URL:test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  needs:
    - job: build-images-job


clean-code-job:
  stage: test
  script:
    - touch dist/app/app/local.py
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - timeout 60m docker pull $DEV_REPOSITORY_URL:dev
    # Source virtual environment and run black
    - docker run --workdir=/app/app --rm $DEV_REPOSITORY_URL:dev bash -c "black --version"
    - docker run --workdir=/app/app --rm $DEV_REPOSITORY_URL:dev bash -c "black --check ."
    # Source virtual environment and run flake8
    - docker run --workdir=/app/app --rm $DEV_REPOSITORY_URL:dev bash -c "flake8 --version"
    - docker run --workdir=/app/app --rm $DEV_REPOSITORY_URL:dev bash -c "flake8"
    # Source virtual environment and run isort
    - docker run --workdir=/app/app --rm $DEV_REPOSITORY_URL:dev bash -c "isort --version"
    - docker run --workdir=/app/app --rm $DEV_REPOSITORY_URL:dev bash -c "isort --check-only ."
    # Source virtual environment and run mypy
    - docker run --workdir=/app/app --rm $DEV_REPOSITORY_URL:dev bash -c "mypy --version"
    # Check i18n: require 100% translation completeness - CI fails if any translations are missing
    - docker run --workdir=/app/app --rm -e MIN_TRANSLATION_COMPLETION=100 $DEV_REPOSITORY_URL:dev bash -c "python check_translations.py"
    # Run tests with coverage using pytest
    - docker run --workdir=/app/app --rm $DEV_REPOSITORY_URL:dev bash -c "python -m pytest --cov=. --cov-report=term ."
  coverage: '/TOTAL\s+\d+\s+\d+\s+(\d+%)/'
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  needs:
    - job: dockle-test-job
      optional: true
    - job: build-images-job

build-job-develop:
  stage: build-develop
  script:
    - IMAGE_TAG="$(date +%Y%m%d)"
    - touch dist/app/app/local.py
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - echo "Pull test image..."
    - timeout 60m docker pull $DEV_REPOSITORY_URL:test
    - echo "Tagging image..."
    - docker tag $DEV_REPOSITORY_URL:test $DEV_REPOSITORY_URL:develop
    - docker tag $DEV_REPOSITORY_URL:test $DEV_REPOSITORY_URL:$IMAGE_TAG
    - echo "Pushing image..."
    - timeout 60m docker push $DEV_REPOSITORY_URL:develop
    - timeout 60m docker push $DEV_REPOSITORY_URL:$IMAGE_TAG
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop" && $CI_PIPELINE_SOURCE != "merge_request_event"'
  needs:
    - job: build-images-job

build-job-prod:
  stage: build-prod
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - echo "Pull test image..."
    - timeout 60m docker pull $DEV_REPOSITORY_URL:test
    - echo "Tagging image..."
    - docker tag $DEV_REPOSITORY_URL:test $DEV_REPOSITORY_URL:latest
    - echo "Pushing image..."
    - timeout 60m docker push $DEV_REPOSITORY_URL:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

create-badges:
  stage: deploy
  script:
    - TEST_IMAGE_SIZE=$(cat test_image_size.txt)
    - DEV_IMAGE_SIZE=$(cat dev_image_size.txt)
    - |
      curl --request POST \
        --header "PRIVATE-TOKEN: $CI_JOB_TOKEN" \
        --header "Content-Type: application/json" \
        --data "{\"name\": \"Test Image Size\", \"link_url\": \"$CI_PROJECT_URL/-/jobs/$CI_JOB_ID\", \"image_url\": \"https://img.shields.io/badge/Test%20Image%20Size-$TEST_IMAGE_SIZE-blue\"}" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/badges"
    - |
      curl --request POST \
        --header "PRIVATE-TOKEN: $CI_JOB_TOKEN" \
        --header "Content-Type: application/json" \
        --data "{\"name\": \"Dev Image Size\", \"link_url\": \"$CI_PROJECT_URL/-/jobs/$CI_JOB_ID\", \"image_url\": \"https://img.shields.io/badge/Dev%20Image%20Size-$DEV_IMAGE_SIZE-green\"}" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/badges"
  dependencies:
    - build-images-job
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'

deploy-to-stage:
  stage: deploy
  script:
    - set -e
    - 'echo "=========================================="'
    - 'echo "Starting staging deployment..."'
    - 'echo "Pipeline ID: ${CI_PIPELINE_ID}"'
    - 'echo "Commit: ${CI_COMMIT_SHORT_SHA}"'
    - 'echo "Time: $(date +%Y-%m-%d %H:%M:%S)"'
    - 'echo "=========================================="'
    - cd /opt/staging-awesome-sms/
    - 'echo "Current running containers:" && (docker compose ps || echo "No containers currently running")'
    - 'echo "Preparing deployment scripts..." && chmod +x deploy-stage.sh migrate-safe.sh rollback-prod.sh 2>/dev/null || true'
    - 'echo "Authenticating with container registry..." && docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY'
    - 'echo "=========================================="'
    - 'echo "Executing zero-downtime deployment..."'
    - 'echo "=========================================="'
    - './deploy-stage.sh 2>&1 | tee deployment-${CI_PIPELINE_ID}.log || (echo "=========================================" && echo "ERROR: Deployment failed!" && echo "Check the logs above for details." && echo "You can manually trigger a rollback from GitLab UI." && echo "=========================================" && exit 1)'
    - 'echo "=========================================="'
    - 'echo "Verifying deployment..."'
    - 'echo "=========================================="'
    - 'echo "Container status:" && docker compose ps'
    - 'for service in app db redis; do docker compose ps | grep -q "${service}.*running" && echo "✓ Service $service is running" || echo "✗ WARNING: Service $service may not be running properly"; done'
    - |
      if [ ! -z "${TRAEFIK_APP_HOSTNAME_STAGE}" ]; then
        echo "Checking application health..."
        for i in {1..30}; do
          HTTP_CODE=$(curl -f -s -o /dev/null -w "%{http_code}" https://${TRAEFIK_APP_HOSTNAME_STAGE}/health/ || echo "000")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✓ Health check passed (HTTP 200)"
            break
          fi
          echo "Waiting for app to start... ($i/30, HTTP: $HTTP_CODE)"
          sleep 2
        done
        if [ "$HTTP_CODE" != "200" ]; then
          echo "✗ Warning: Health check did not return HTTP 200 after 60 seconds - The application may still be starting up."
        fi
      else
        echo "Skipping health check (TRAEFIK_APP_HOSTNAME_STAGE not set)"
      fi
    - 'echo "=========================================="'
    - 'echo "Staging deployment completed successfully!"'
    - 'echo "Pipeline ID: ${CI_PIPELINE_ID}"'
    - 'echo "Commit: ${CI_COMMIT_SHORT_SHA}"'
    - 'echo "Completed at: $(date +%Y-%m-%d %H:%M:%S)"'
    - 'echo "=========================================="'
    - 'echo "Recent application logs:" && docker compose logs --tail=20 app || true'
    - 'cp deployment-${CI_PIPELINE_ID}.log ${CI_PROJECT_DIR}/deployment-stage-${CI_PIPELINE_ID}.log || true'
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop" && $CI_PIPELINE_SOURCE != "merge_request_event"'
  tags:
    - awesomesms-prod-delivery
  needs:
    - job: build-job-develop
    - job: clean-code-job
      optional: true  # Job may not exist (runs only on MR)
    - job: trivy-test-job
      optional: true  # Job may not exist (runs only on MR)
  artifacts:
    name: "deployment-stage-logs-${CI_PIPELINE_ID}"
    paths:
      - deployment-stage-${CI_PIPELINE_ID}.log
    expire_in: 30 days
    when: always

rollback-stage:
  stage: deploy
  when: manual
  script:
    - set -e
    - 'echo "=========================================="'
    - 'echo "Starting staging rollback..."'
    - 'echo "Pipeline ID: ${CI_PIPELINE_ID}"'
    - 'echo "Time: $(date +%Y-%m-%d %H:%M:%S)"'
    - 'echo "=========================================="'
    - cd /opt/staging-awesome-sms/
    - 'echo "Current container state before rollback:" && (docker compose ps || echo "No containers currently running")'
    - chmod +x rollback-prod.sh
    - 'echo "Authenticating with container registry..." && docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY'
    - 'echo "=========================================="'
    - 'echo "Executing rollback..."'
    - 'echo "=========================================="'
    - './rollback-prod.sh 2>&1 | tee rollback-${CI_PIPELINE_ID}.log || (echo "=========================================" && echo "ERROR: Rollback failed!" && echo "Manual intervention may be required." && echo "Check the logs above for details." && echo "=========================================" && exit 1)'
    - 'echo "=========================================="'
    - 'echo "Verifying rollback..."'
    - 'echo "=========================================="'
    - 'echo "Container status after rollback:" && docker compose ps'
    - 'for service in app db redis; do docker compose ps | grep -q "${service}.*running" && echo "✓ Service $service is running" || echo "✗ WARNING: Service $service may not be running properly"; done'
    - 'echo "=========================================="'
    - 'echo "Staging rollback completed!"'
    - 'echo "Pipeline ID: ${CI_PIPELINE_ID}"'
    - 'echo "Completed at: $(date +%Y-%m-%d %H:%M:%S)"'
    - 'echo "=========================================="'
    - 'echo "Recent application logs after rollback:" && docker compose logs --tail=20 app || true'
    - 'cp rollback-${CI_PIPELINE_ID}.log ${CI_PROJECT_DIR}/rollback-stage-${CI_PIPELINE_ID}.log || true'
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
  tags:
    - awesomesms-prod-delivery
  allow_failure: true
  artifacts:
    name: "rollback-stage-logs-${CI_PIPELINE_ID}"
    paths:
      - rollback-stage-${CI_PIPELINE_ID}.log
    expire_in: 30 days
    when: always

migrate-stage:
  stage: deploy
  when: manual
  script:
    - set -e
    - 'echo "=========================================="'
    - 'echo "Starting safe database migration on staging..."'
    - 'echo "Pipeline ID: ${CI_PIPELINE_ID}"'
    - 'echo "Time: $(date +%Y-%m-%d %H:%M:%S)"'
    - 'echo "=========================================="'
    - cd /opt/staging-awesome-sms/
    - 'echo "Checking database connectivity..." && (docker compose exec -T app python3 manage.py dbshell --command="SELECT VERSION();" || echo "Database connection check failed")'
    - chmod +x migrate-safe.sh
    - 'echo "Authenticating with container registry..." && docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY'
    - 'echo "=========================================="'
    - 'echo "Executing safe migration with backup..."'
    - 'echo "=========================================="'
    - 'echo "Note: This will create a database backup before applying migrations."'
    - './migrate-safe.sh 2>&1 | tee migration-${CI_PIPELINE_ID}.log || (echo "=========================================" && echo "ERROR: Migration failed!" && echo "The database backup should be available for recovery." && echo "Check the logs above for details." && echo "=========================================" && exit 1)'
    - 'echo "=========================================="'
    - 'echo "Verifying migration..."'
    - 'echo "=========================================="'
    - 'echo "Checking migration status..." && (docker compose exec -T app python3 manage.py showmigrations --plan | tail -20 || echo "Could not retrieve migration status")'
    - 'echo "Testing application connectivity..." && (docker compose exec -T app python3 manage.py check --database default || echo "Database check failed")'
    - 'echo "=========================================="'
    - 'echo "Staging migration completed successfully!"'
    - 'echo "Pipeline ID: ${CI_PIPELINE_ID}"'
    - 'echo "Completed at: $(date +%Y-%m-%d %H:%M:%S)"'
    - 'echo "Note: Database backup created before migration"'
    - 'echo "=========================================="'
    - 'echo "Recent backup files:" && (ls -lh *.sql.gz 2>/dev/null | head -5 || echo "No backup files found in current directory")'
    - 'cp migration-${CI_PIPELINE_ID}.log ${CI_PROJECT_DIR}/migration-stage-${CI_PIPELINE_ID}.log || true'
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
  tags:
    - awesomesms-prod-delivery
  needs:
    - build-images-job
  artifacts:
    name: "migration-stage-logs-${CI_PIPELINE_ID}"
    paths:
      - migration-stage-${CI_PIPELINE_ID}.log
    expire_in: 30 days
    when: always

deploy-to-prod:
  stage: deploy
  script:
    - set -e
    - 'echo "=========================================="'
    - 'echo "Starting zero-downtime deployment..."'
    - 'echo "Pipeline ID: ${CI_PIPELINE_ID}"'
    - 'echo "Commit: ${CI_COMMIT_SHORT_SHA}"'
