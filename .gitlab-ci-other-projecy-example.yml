    - 'echo "Authenticating with container registry..." && docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY'
    - 'echo "=========================================="'
    - 'echo "Executing safe migration with backup..."'
    - 'echo "=========================================="'
    - 'echo "Note: This will create a database backup before applying migrations."'
    - './migrate-safe.sh 2>&1 | tee migration-${CI_PIPELINE_ID}.log || (echo "=========================================" && echo "ERROR: Migration failed!" && echo "The database backup should be available for recovery." && echo "Check the logs above for details." && echo "=========================================" && exit 1)'
    - 'echo "=========================================="'
    - 'echo "Verifying migration..."'
    - 'echo "=========================================="'
    - 'echo "Checking migration status..." && (docker compose exec -T app python3 manage.py showmigrations --plan | tail -20 || echo "Could not retrieve migration status")'
    - 'echo "Testing application connectivity..." && (docker compose exec -T app python3 manage.py check --database default || echo "Database check failed")'
    - 'echo "=========================================="'
    - 'echo "Migration completed successfully!"'
    - 'echo "Pipeline ID: ${CI_PIPELINE_ID}"'
    - 'echo "Completed at: $(date +%Y-%m-%d %H:%M:%S)"'
    - 'echo "Note: Database backup created before migration"'
    - 'echo "=========================================="'
    - 'echo "Recent backup files:" && (ls -lh *.sql.gz 2>/dev/null | head -5 || echo "No backup files found in current directory")'
    - 'cp migration-${CI_PIPELINE_ID}.log ${CI_PROJECT_DIR}/migration-${CI_PIPELINE_ID}.log || true'
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  tags:
    - awesomesms-prod-delivery
  needs:
    - build-job-prod
  artifacts:
    name: "migration-logs-${CI_PIPELINE_ID}"
    paths:
      - migration-${CI_PIPELINE_ID}.log
    expire_in: 30 days
    when: always
