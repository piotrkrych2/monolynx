    - if: '$CI_COMMIT_BRANCH == "main"'
  tags:
    - awesomesms-prod-delivery
  allow_failure: true
  artifacts:
    name: "rollback-logs-${CI_PIPELINE_ID}"
    paths:
      - rollback-${CI_PIPELINE_ID}.log
    expire_in: 30 days
    when: always

