stages:
  - build
  - lint
  - test
  - push
  - deploy

.docker-dind:
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"

# --- Build ---

docker-build-test:
  stage: build
  extends: .docker-dind
  script:
    - docker build --target dev --tag "$CI_REGISTRY_IMAGE:dev" .
    - docker build --tag "$CI_REGISTRY_IMAGE:test" .
    - docker push "$CI_REGISTRY_IMAGE:dev"
    - docker push "$CI_REGISTRY_IMAGE:test"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH == "main"

# --- Lint ---

clean-code:
  stage: lint
  extends: .docker-dind
  script:
    - docker pull "$CI_REGISTRY_IMAGE:dev"
    - docker run --rm "$CI_REGISTRY_IMAGE:dev" ruff check src/ tests/ sdk/
    - docker run --rm "$CI_REGISTRY_IMAGE:dev" ruff format --check src/ tests/ sdk/
    - docker run --rm "$CI_REGISTRY_IMAGE:dev" mypy src/
    - docker rm -f db test-runner 2>/dev/null || true
    - docker network create test-net 2>/dev/null || true
    - docker run -d --name db --network test-net
        -e POSTGRES_USER=sentry
        -e POSTGRES_PASSWORD=sentry_ci
        pgvector/pgvector:pg16
    - sleep 5
    - TEST_EXIT=0
    - docker run --name test-runner --network test-net
        -e DATABASE_URL="postgresql+asyncpg://sentry:sentry_ci@db:5432/open_sentry"
        "$CI_REGISTRY_IMAGE:dev"
        pytest tests/ --cov=src/monolynx --cov-report=term --cov-report=xml:coverage.xml
        || TEST_EXIT=$?
    - docker cp test-runner:/app/coverage.xml coverage.xml || true
    - docker rm -f db test-runner 2>/dev/null || true
    - exit $TEST_EXIT
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH == "main"

trivy-scan:
  stage: test
  extends: .docker-dind
  variables:
    TRIVY_VERSION: "0.69.2"
  before_script:
    - curl -sfL https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz | tar xzf - -C /usr/local/bin trivy
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - trivy fs --scanners vuln --ignore-unfixed --severity HIGH,CRITICAL --exit-code 1 requirements/base.txt
    - docker pull "$CI_REGISTRY_IMAGE:test"
    - trivy image --ignore-unfixed --exit-code 0 "$CI_REGISTRY_IMAGE:test"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

dockle-scan:
  stage: test
  extends: .docker-dind
  variables:
    DOCKLE_VERSION: "0.4.14"
  before_script:
    - apk add --no-cache curl tar
    - curl -sfL https://github.com/goodwithtech/dockle/releases/download/v${DOCKLE_VERSION}/dockle_${DOCKLE_VERSION}_Linux-64bit.tar.gz | tar xzf - -C /usr/local/bin dockle
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker pull "$CI_REGISTRY_IMAGE:test"
    - dockle --exit-code 1 "$CI_REGISTRY_IMAGE:test"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - Dockerfile

# --- Push ---

docker-push-develop:
  stage: push
  extends: .docker-dind
  script:
    - IMAGE_TAG="$(date +%Y%m%d)"
    - docker pull "$CI_REGISTRY_IMAGE:test"
    - docker tag "$CI_REGISTRY_IMAGE:test" "$CI_REGISTRY_IMAGE:develop"
    - docker tag "$CI_REGISTRY_IMAGE:test" "$CI_REGISTRY_IMAGE:$IMAGE_TAG"
    - docker push "$CI_REGISTRY_IMAGE:develop"
    - docker push "$CI_REGISTRY_IMAGE:$IMAGE_TAG"
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"

docker-push-prod:
  stage: push
  extends: .docker-dind
  script:
    - docker pull "$CI_REGISTRY_IMAGE:test"
    - docker tag "$CI_REGISTRY_IMAGE:test" "$CI_REGISTRY_IMAGE:latest"
    - docker tag "$CI_REGISTRY_IMAGE:test" "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
    - docker push "$CI_REGISTRY_IMAGE:latest"
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# --- Deploy ---

deploy-staging:
  stage: deploy
  image: alpine:latest
  script:
    - echo "TODO -- deploy to staging"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual

sync-graph:
  stage: deploy
  image: python:3.12-slim
  script:
    - python cicd/sync_graph.py
  variables:
    MONOLYNX_URL: "${MONOLYNX_URL}"
    MONOLYNX_GRAPH_TOKEN: "${MONOLYNX_GRAPH_TOKEN}"
    MONOLYNX_PROJECT_SLUG: "${MONOLYNX_PROJECT_SLUG}"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: on_success
