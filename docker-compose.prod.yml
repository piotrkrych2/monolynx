services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-open_monolynx}
      POSTGRES_USER: ${POSTGRES_USER:-monolynx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-monolynx_dev}
    # ports:
    #   - "${DB_PORT:-5432}:5432"
    volumes:
      - ./.data/pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-monolynx} -d ${POSTGRES_DB:-open_monolynx}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - appname-net

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4j_dev}
    volumes:
      - ./.data/neo4j:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - appname-net

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - ./.data/minio:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - appname-net

  app:
    image: registry.gitlab.com/piotrkrych/monolynx:latest

    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK_NAME}"
      - "traefik.http.routers.${TRAEFIK_ROUTE_NAME}.rule=Host(`${TRAEFIK_APP_HOSTNAME}`)"
      - "traefik.http.routers.${TRAEFIK_ROUTE_NAME}.entrypoints=${TRAEFIK_APP_ENTRYPOINT}"
      - "traefik.http.routers.${TRAEFIK_ROUTE_NAME}.tls.certresolver=${TRAEFIK_APP_CERTRESOLVER}"
      - "traefik.http.services.${TRAEFIK_ROUTE_NAME}.loadbalancer.server.port=8000"
      - "traefik.http.services.${TRAEFIK_ROUTE_NAME}.loadbalancer.healthcheck.path=/api/v1/health"
      - "traefik.http.services.${TRAEFIK_ROUTE_NAME}.loadbalancer.healthcheck.interval=30s"
      - "traefik.http.services.${TRAEFIK_ROUTE_NAME}.loadbalancer.healthcheck.timeout=5s"
      - "traefik.http.services.${TRAEFIK_ROUTE_NAME}.loadbalancer.healthcheck.scheme=http"
      - "traefik.http.services.${TRAEFIK_ROUTE_NAME}.loadbalancer.sticky.cookie=true"
      - "traefik.http.services.${TRAEFIK_ROUTE_NAME}.loadbalancer.sticky.cookie.name=open_monolynx_com"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-monolynx}:${POSTGRES_PASSWORD:-monolynx_dev}@db:5432/${POSTGRES_DB:-open_monolynx}
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      ENABLE_MONITOR_LOOP: "false"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      APP_URL: ${APP_URL:-http://localhost:8000}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@mypage.local}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      MCP_ALLOWED_HOSTS: ${MCP_ALLOWED_HOSTS:-}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-monolynx-wiki}
      MINIO_USE_SSL: "false"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4j_dev}
      ENABLE_GRAPH_DB: ${ENABLE_GRAPH_DB:-true}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - appname-net
      - traefik-network

  worker:
    image: registry.gitlab.com/monolynx/monolynx:latest
    restart: unless-stopped
    command: ["python", "-m", "monolynx.worker"]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-monolynx}:${POSTGRES_PASSWORD:-monolynx_dev}@db:5432/${POSTGRES_DB:-open_monolynx}
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4j_dev}
      ENABLE_GRAPH_DB: ${ENABLE_GRAPH_DB:-true}
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/worker-healthy && find /tmp/worker-healthy -mmin -1 | grep -q ."]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      db:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - appname-net

networks:
  appname-net:
    name: monolynx-network
    driver: bridge
  traefik-network:
    name: traefik-external
    external: true
